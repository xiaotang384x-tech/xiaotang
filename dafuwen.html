<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗米大富翁 - 项目详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #F5EFE6;
        }
        img {
            display: block;
            width: 100vw;
            height: auto;
        }
        .floating-ball {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
        }
        .ball {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6B8EAD, #4A6984);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .ball:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .expand-menu {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: top;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .floating-ball:hover .expand-menu {
            transform: translateX(-50%) scaleY(1);
            opacity: 1;
        }
        .menu-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .menu-btn:hover {
            transform: scale(1.1);
        }
        .btn-top {
            background: linear-gradient(135deg, #C13A3A, #A02);
        }
        .btn-home {
            background: linear-gradient(135deg, #6B8EAD, #4A6984);
        }
    </style>
</head>
<body>
    <img src="resources/米7.jpg" alt="米7">

    <div class="floating-ball">
        <div class="ball">☰</div>
        <div class="expand-menu">
            <a href="#" class="menu-btn btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'}); return false;">↑ TOP</a>
            <a href="index.html" class="menu-btn btn-home">🏠 HOME</a>
        </div>
    </div>
</body>
</html>
